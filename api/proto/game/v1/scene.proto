syntax = "proto3";

package game.v1;

option go_package = "github.com/fracturing-space/game/api/gen/go/game/v1;gamev1";

message Scene {
  string id = 1;
  string session_id = 2;
  string name = 3;
  bool active = 4;
  bool ended = 5;
  repeated string character_ids = 6;
}

message SceneCreated {
  string scene_id = 1;
  string session_id = 2;
  string name = 3;
  repeated string character_ids = 4;
}

message SceneActivated {
  string scene_id = 1;
}

message SceneEnded {
  string scene_id = 1;
}

message SceneCastReplaced {
  string scene_id = 1;
  repeated string character_ids = 2;
}
